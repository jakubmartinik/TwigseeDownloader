name: Bump version

on:
  pull_request:
    types: [closed]
    branches: [master]
  push:
    branches: [master]

jobs:
  bump-version:
    # For PRs: only on merge. For pushes: skip the bot's own version bump commits.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q "bump:major"; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -q "bump:minor"; then
              echo "type=minor" >> $GITHUB_OUTPUT
            elif echo "$LABELS" | grep -q "bump:patch"; then
              echo "type=patch" >> $GITHUB_OUTPUT
            else
              echo "type=none" >> $GITHUB_OUTPUT
            fi
          else
            MSG="${{ github.event.head_commit.message }}"
            if echo "$MSG" | grep -q "#major"; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif echo "$MSG" | grep -q "#minor"; then
              echo "type=minor" >> $GITHUB_OUTPUT
            elif echo "$MSG" | grep -q "#patch"; then
              echo "type=patch" >> $GITHUB_OUTPUT
            else
              echo "type=none" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump version in config.yaml
        if: steps.bump.outputs.type != 'none'
        id: version
        run: |
          CONFIG="TwigseeDownloader/config.yaml"
          CURRENT=$(grep '^version:' "$CONFIG" | sed 's/version: "\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/^version: \".*\"/version: \"$NEW_VERSION\"/" "$CONFIG"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "old=$CURRENT" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TwigseeDownloader/config.yaml
          git commit -m "chore: bump version ${{ steps.version.outputs.old }} → ${{ steps.version.outputs.new }}"
          git push
