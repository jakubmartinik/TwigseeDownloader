name: "Rohlik proxy"
description: "Remote access proxy for rohlik MCP server"
version: "2.0.0"
slug: "rohlik_proxy"
url: "https://github.com/homeassistant-ai/ha-mcp"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
map:
  - config:rw
options:
  remote_url: ""
  mcp_server_url: ""
  mcp_port: 9583
schema:
  remote_url: str?
  mcp_server_url: str?
  mcp_port: port?
